version: '3.8'
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - 27017:27017

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - 6379:6379

  backend:
    build: ./backend
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/globaltalk
      - REDIS_URL=redis://redis:6379
      - CLIENT_ORIGIN=http://localhost:5173
    ports:
      - 4000:4000
    depends_on:
      - mongo
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api
        VITE_SOCKET_URL: http://localhost:4000
    ports:
      - 5173:80
    depends_on:
      - backend

volumes:
  mongo_data:
